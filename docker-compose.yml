version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpr-pro-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      ALPR_OUTPUT_DIR: /app/outputs
      ALPR_OCR_MODE: tesseract
      ALPR_CONFIDENCE: "0.25"
      ALPR_IOU: "0.45"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./data:/app/data
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpr-pro-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      ALPR_OUTPUT_DIR: /app/outputs
      ALPR_OCR_MODE: tesseract
      ALPR_CONFIDENCE: "0.25"
      ALPR_IOU: "0.45"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./data:/app/data
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      - api
